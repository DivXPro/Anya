[platformio]
default_envs = m5stickc-s3

[env:m5stickc-s3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
build_src_filter =
    +<*>
    -<speaker_smoke.cpp>
    -<i2s_smoke.cpp>
    -<button_audio_smoke.cpp>
    -<speaker_stream_smoke.cpp>

lib_deps =
    m5stack/M5Unified @ ^0.2.7
    m5stack/M5PM1
    links2004/WebSockets
    bblanchon/ArduinoJson

build_flags =
    -std=gnu++17
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    '-DFIRMWARE_VERSION="v0.1.13-dirty"'

