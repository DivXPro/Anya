[platformio]
default_envs = test

[env:test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    bblanchon/ArduinoJson
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=4
build_src_filter = 
    +<wifi.cpp>
    +<wifi_portal.cpp>
    +<mdns_client.cpp>
    +<main.cpp>
    -<ws_client.cpp>
    -<protocol.cpp>
    -<audio.cpp>
    -<buttons.cpp>
    -<display.cpp>
    -<state.cpp>
